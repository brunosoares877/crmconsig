version: '3.3'

services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.0
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://evolution_api:8080
      - QRCODE_LIMIT=30
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - LOG_OUTPUT=console
      - DEL_INSTANCE=false
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution
      - DATABASE_CLIENT_NAME=evolution_exchange
      - RABBITMQ_ENABLED=false
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379/1
      - REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - AUTHENTICATION_API_KEY=429683C4C977415CAAFCCE10F7D57E11 # Global API Key
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - WEBSOCKET_ENABLED=true
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      - postgres
      - redis

  postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    ports:
      - "5433:5432" # Mapped to 5433 to avoid conflict if user has local pg
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data

  redis:
    container_name: evolution_redis
    image: redis:7
    restart: always
    ports:
      - "6380:6379" # Mapped to 6380 to avoid conflict
    volumes:
      - evolution_redis_data:/data

volumes:
  evolution_instances:
  evolution_store:
  evolution_pgdata:
  evolution_redis_data:
